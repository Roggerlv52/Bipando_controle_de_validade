<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <span class="material-icons login-logo">qr_code_scanner</span>
            <h2>Bipando</h2>
            <p>Controle de Validade</p>
        </div>
        
        <form id="login-form" class="login-form">
            <div class="input-group">
                <span class="material-icons input-icon">email</span>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            
            <div class="input-group">
                <span class="material-icons input-icon">lock</span>
                <input type="password" id="password" placeholder="Senha" required>
                <span class="material-icons toggle-password" id="toggle-password">visibility</span>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember"> Lembrar-me
                </label>
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn-login">
                <span>Entrar</span>
                <span class="material-icons">arrow_forward</span>
            </button>
        </form>
        
        <div class="login-footer">
            <p>Não tem uma conta? <a href="#" id="go-to-register">Cadastre-se</a></p>
        </div>
    </div>
</div>
